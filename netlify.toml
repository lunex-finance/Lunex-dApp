[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # wagmi + viem + the Circle SDKs have strict peer deps; allow the resolver to
  # proceed so `npm ci` / `npm install` doesn't abort during initialization.
  NPM_FLAGS = "--legacy-peer-deps"

# SPA fallback so client-side routes (/swap, /bridge, ...) resolve on refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
